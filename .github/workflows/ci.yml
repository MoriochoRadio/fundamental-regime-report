name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # uv.lock 해시로 캐시 키 자동 생성

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check src/frr tests scripts

      - name: Ruff format check
        run: uv run ruff format --check src/frr tests scripts

      - name: Pytest (unit only — exclude integration)
        # 통합 테스트(`integration` 마커)는 외부 API 의존이라 CI 기본 제외.
        # 로컬에서 `uv run pytest` 또는 `uv run pytest -m integration` 으로 실행.
        run: uv run pytest -m "not integration" -q
