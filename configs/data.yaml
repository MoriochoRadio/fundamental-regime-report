# 데이터 파이프라인 설정.
#
# 본 파일은 분석 기간·유니버스·DART lag 등 *코드 변경 없이 실험을 바꾸기*
# 위한 설정의 단일 source of truth. `src/frr/config.py` 의
# `load_data_config()` 가 로딩한다.
#
# 캐시 경로는 각 어댑터(`fdr.py`/`krx.py`/`dart.py`/`calendars.py`)의
# `DEFAULT_CACHE_REL_DIR` 를 사용한다. 별도 override 가 필요해지면 이
# 파일에 cache 섹션을 추가한다.

analysis:
  # 분석 시작일·종료일 (CLAUDE.md §4.1 의 확정값).
  # 애초 2010-2024 였으나 KRX 가 2014-05-01 이전 데이터를 제공하지 않아
  # 단계 1 가용성 검증 후 2015-2024 로 단축됨.
  start: 2015-01-01
  end: 2024-12-31

universe:
  # point-in-time KOSPI200 + 상장폐지 종목. universe_loader 가 이 매니페스트
  # 를 읽어 *완전 검증된* 분기만 노출한다.
  manifest_path: data/external/kospi200_quarterly/MANIFEST.yaml

dart:
  # D7: DART 접수일(`rcept_dt`) + N 영업일 이후부터 사용 가능.
  filing_lag_business_days: 1
  # 정기보고서 종류 (DARTReporter.REPORT_CODES 키).
  periods:
    - Q1
    - H1
    - Q3
    - FY
  # 재무제표 구분: CFS=연결, OFS=별도.
  # v1 은 CFS 기본 (대부분 비금융 일반 기업에 적합).
  # 지주회사·금융지주는 별도 기반이 더 정확할 수 있으며, 일부 종목은 CFS
  # 미작성 → OFS fallback 필요. **D10 결정 대기** — 단계 2 진입 시 재검토.
  fs_div: CFS
